<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Embed demo — Bellamar widget</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; color: #20303a; }
      .hero { min-height: 100vh; padding: 80px 24px; background: linear-gradient(180deg,#eef3f5,#fff);
              display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
      h1 { font-size: 34px; margin: 0 0 10px; }
      p { color: #5d6b73; max-width: 520px; }
      .tag { background: #0c2733; color: #c9a45f; padding: 4px 12px; border-radius: 999px; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="hero">
      <span class="tag">Sample host page</span>
      <h1>Bellamar Housing</h1>
      <p>This page simulates a website with the chatbot embedded. Look at the
         bottom-right corner — click the bubble to open the assistant.</p>
    </div>

    <!-- The one line you add to the real website (Base44): -->
    <script src="/embed.js" defer></script>
  </body>
</html>
